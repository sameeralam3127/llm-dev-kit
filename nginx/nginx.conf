worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Docker's embedded DNS returns one A record per replica; nginx resolves the
    # service name at startup and round-robins across all of them.
    upstream open_webui {
        server open-webui:8080;
    }

    upstream llm_service {
        server llm-service:8010;
    }

    upstream rag_service {
        server rag-service:8020;
    }

    upstream webhook_service {
        server webhook-service:8030;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    server {
        listen 80;

        client_max_body_size 64m;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Streaming (SSE) must not be buffered.
        proxy_buffering off;

        # OpenAI-compatible RAG API (used by Open WebUI and any OpenAI SDK)
        location /v1/ {
            proxy_pass http://rag_service;
        }

        # RAG service REST API (chat, ingest, cache, documents)
        location /api/rag/ {
            proxy_pass http://rag_service/;
        }

        # LLM router service (models, providers, generate, embed)
        location /api/llm/ {
            proxy_pass http://llm_service/;
        }

        # GitHub webhooks
        location /webhooks/ {
            proxy_pass http://webhook_service;
        }

        # Open WebUI frontend (websockets required)
        location / {
            proxy_pass http://open_webui;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
