x-python-healthcheck: &python-healthcheck
  interval: 15s
  timeout: 5s
  retries: 10

services:
  # ---------------------------------------------------------------- gateway
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      open-webui:
        condition: service_started
      llm-service:
        condition: service_healthy
      rag-service:
        condition: service_healthy
      webhook-service:
        condition: service_healthy
    restart: unless-stopped

  # --------------------------------------------------------------- frontend
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    environment:
      WEBUI_NAME: "LLM Dev Kit"
      # Direct offline chat against local Ollama models
      OLLAMA_BASE_URL: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      # RAG-augmented models served by rag-service through the load balancer.
      # The placeholder key is ignored by the backend; add real cloud keys in
      # Open WebUI (Admin Settings -> Connections) or in .env.
      ENABLE_OPENAI_API: "true"
      OPENAI_API_BASE_URL: http://nginx/v1
      OPENAI_API_KEY: sk-local-rag
    volumes:
      - open_webui_data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ----------------------------------------------------------- microservices
  llm-service:
    build:
      context: .
      target: llm-service
    command: uvicorn llm_service.main:app --host 0.0.0.0 --port 8010 --reload
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      DEFAULT_CHAT_MODEL: ${DEFAULT_CHAT_MODEL:-llama3.1}
      DEFAULT_EMBEDDING_MODEL: ${DEFAULT_EMBEDDING_MODEL:-nomic-embed-text}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
    volumes:
      - ./services/devkit_common:/app/devkit_common
      - ./services/llm_service:/app/llm_service
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health', timeout=3)"]
      <<: *python-healthcheck
    restart: unless-stopped

  rag-service:
    build:
      context: .
      target: rag-service
    command: uvicorn rag_service.main:app --host 0.0.0.0 --port 8020 --reload
    deploy:
      replicas: 2
    environment:
      LLM_SERVICE_URL: http://llm-service:8010
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      QDRANT_URL: http://qdrant:6333
      DEFAULT_CHAT_MODEL: ${DEFAULT_CHAT_MODEL:-llama3.1}
      RETRIEVER_SCORE_THRESHOLD: ${RETRIEVER_SCORE_THRESHOLD:-0.72}
      CACHE_TTL: ${CACHE_TTL:-3600}
    volumes:
      - ./services/devkit_common:/app/devkit_common
      - ./services/rag_service:/app/rag_service
    depends_on:
      llm-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8020/health', timeout=3)"]
      <<: *python-healthcheck
    restart: unless-stopped

  webhook-service:
    build:
      context: .
      target: webhook-service
    command: uvicorn webhook_service.main:app --host 0.0.0.0 --port 8030 --reload
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
    volumes:
      - ./services/devkit_common:/app/devkit_common
      - ./services/webhook_service:/app/webhook_service
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8030/health', timeout=3)"]
      <<: *python-healthcheck
    restart: unless-stopped

  embedding-worker:
    build:
      context: .
      target: embedding-worker
    environment:
      LLM_SERVICE_URL: http://llm-service:8010
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QDRANT_URL: http://qdrant:6333
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_DEFAULT_OWNER: ${GITHUB_DEFAULT_OWNER:-}
      GITHUB_DEFAULT_REPO: ${GITHUB_DEFAULT_REPO:-}
      GITHUB_DEFAULT_BRANCH: ${GITHUB_DEFAULT_BRANCH:-main}
      GITHUB_CACHE_TTL: ${GITHUB_CACHE_TTL:-600}
    volumes:
      - ./services/devkit_common:/app/devkit_common
      - ./services/embedding_worker:/app/embedding_worker
    depends_on:
      llm-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  mcp:
    build:
      context: .
      target: mcp-service
    environment:
      LLM_SERVICE_URL: http://llm-service:8010
      RAG_SERVICE_URL: http://rag-service:8020
    volumes:
      - ./services/devkit_common:/app/devkit_common
      - ./services/mcp_service:/app/mcp_service
    depends_on:
      rag-service:
        condition: service_healthy
    profiles:
      - mcp

  # ----------------------------------------------------------- infrastructure
  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # Optional: run Ollama in Docker instead of on the host. Enable with
  # `docker compose --profile ollama up` and set OLLAMA_HOST=http://ollama:11434
  # in .env. Note: on macOS this runs CPU-only; host Ollama is faster.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama
    restart: unless-stopped

volumes:
  chroma_data:
  qdrant_data:
  open_webui_data:
  ollama_data:

networks:
  default:
    name: llm-dev-kit-network
