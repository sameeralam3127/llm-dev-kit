services:
  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:29092"
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: INTERNAL://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v2/heartbeat')"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  api:
    build:
      context: .
      target: api
    command: uvicorn app.api:api --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      DEFAULT_CHAT_MODEL: llama3.1
      DEFAULT_EMBEDDING_MODEL: nomic-embed-text
      CACHE_TTL: 3600
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./app:/app/app
    depends_on:
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
      kafka:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  embedding-worker:
    build:
      context: .
      target: worker
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QDRANT_URL: http://qdrant:6333
      DEFAULT_EMBEDDING_MODEL: nomic-embed-text
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_DEFAULT_OWNER: ${GITHUB_DEFAULT_OWNER:-}
      GITHUB_DEFAULT_REPO: ${GITHUB_DEFAULT_REPO:-}
      GITHUB_DEFAULT_BRANCH: ${GITHUB_DEFAULT_BRANCH:-main}
    volumes:
      - ./app:/app/app
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
    command: streamlit run app/main.py --server.port=8501 --server.address=0.0.0.0 --server.runOnSave=true --server.headless=true --browser.gatherUsageStats=false
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8001
    volumes:
      - ./app:/app/app
      - app_data:/app/data
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  mcp:
    build:
      context: .
      target: mcp
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      DEFAULT_CHAT_MODEL: llama3.1
    volumes:
      - ./app:/app/app
    depends_on:
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - mcp

volumes:
  chroma_data:
  qdrant_data:
  app_data:

networks:
  default:
    name: llm-dev-kit-network
